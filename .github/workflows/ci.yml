name: CI

on:
  pull_request:
    branches: [v*.*.*, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install docscribe gem
        run: |
          GEM_REPO="https://github.com/unurgunite/docscribe.git"
          REF=""
          if [ -n "$DOCSCRIBE_REF" ]; then
            REF="$DOCSCRIBE_REF"
          elif echo "${{ github.base_ref }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' && \
               git ls-remote --heads "$GEM_REPO" "${{ github.base_ref }}" | grep -q .; then
            REF="${{ github.base_ref }}"
          else
            REF=$(git ls-remote --heads "$GEM_REPO" 'v*.*.*' | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1 || true)
          fi
          if [ -z "$REF" ]; then
            REF=$(git ls-remote --heads "$GEM_REPO" master | head -1 | awk '{print $2}' | sed 's|refs/heads/||')
          fi
          if [ -n "$REF" ]; then
            git clone --branch "$REF" --depth 1 "$GEM_REPO" /tmp/docscribe
            cd /tmp/docscribe && gem build docscribe.gemspec && gem install docscribe-*.gem
          else
            gem install docscribe
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check version consistency
        run: |
          HEAD_BRANCH="${{ github.head_ref }}"
          if echo "$HEAD_BRANCH" | grep -q '^system/'; then
            echo "⏭️ Skipping version checks for system/ branch"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --format=%s)
          MSG_VERSION=$(echo "$COMMIT_MSG" | grep -oE '\[[0-9]+\.[0-9]+\.[0-9]+\]' | tr -d '[]' || true)
          PROP_VERSION=$(grep pluginVersion gradle.properties | cut -d= -f2 | tr -d ' ')
          BASE_BRANCH="${{ github.base_ref }}"

          if [ -z "$MSG_VERSION" ]; then
            echo "❌ Commit message must contain version tag, e.g. [0.1.2]"
            echo "  Got: $COMMIT_MSG"
            exit 1
          fi
          if [ "$MSG_VERSION" != "$PROP_VERSION" ]; then
            echo "❌ Version mismatch: commit says [$MSG_VERSION], plugin is $PROP_VERSION"
            exit 1
          fi
          echo "✅ $MSG_VERSION = pluginVersion"

          if echo "$BASE_BRANCH" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            BRANCH_VERSION=$(echo "$BASE_BRANCH" | tr -d 'v')
            if [ "$BRANCH_VERSION" != "$PROP_VERSION" ]; then
              echo "❌ Branch version mismatch: merging into $BASE_BRANCH but plugin is $PROP_VERSION"
              exit 1
            fi
            echo "✅ $BASE_BRANCH = pluginVersion"
          else
            echo "⏭️ Skipping branch check: base branch is '$BASE_BRANCH' (not a version branch)"
          fi
          echo "✅ All version checks passed"

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Static analysis
        run: ./gradlew detekt

      - name: Test
        run: ./gradlew test

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Build
        run: ./gradlew buildPlugin
