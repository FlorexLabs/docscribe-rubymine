name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install docscribe gem
        run: |
          GEM_REPO="https://github.com/unurgunite/docscribe.git"
          REF=$(git ls-remote --heads "$GEM_REPO" 'v*.*.*' | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1 || true)
          if [ -z "$REF" ]; then
            REF=$(git ls-remote --heads "$GEM_REPO" master | head -1 | awk '{print $2}' | sed 's|refs/heads/||')
          fi
          if [ -n "$REF" ]; then
            git clone --branch "$REF" --depth 1 "$GEM_REPO" /tmp/docscribe
            cd /tmp/docscribe && gem build docscribe.gemspec && gem install docscribe-*.gem
          else
            gem install docscribe
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Static analysis
        run: ./gradlew detekt

      - name: Test
        run: ./gradlew test

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Prepare artifacts
        run: |
          mkdir -p release
          cp build/distributions/docscribe-rubymine-*.zip release/

      # - name: Publish to JetBrains Marketplace
      #   env:
      #     JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
      #   run: ./gradlew publishPlugin

      - name: Create GitHub Release
        run: |
          TAG="v${{ inputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
